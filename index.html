<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rnn-glider reactor prototype</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        background: radial-gradient(circle at top, #1f2a44 0%, #0a0f1d 55%, #04060d 100%);
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      }

      canvas {
        border: 1px solid #2f3a57;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
        background: #050915;
        width: min(100vw, calc(100vh * 16 / 9));
        height: min(100vh, calc(100vw * 9 / 16));
        max-width: 100vw;
        max-height: 100vh;
      }
    </style>
  </head>
  <body>
    <canvas id="game" width="1920" height="1080"></canvas>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
